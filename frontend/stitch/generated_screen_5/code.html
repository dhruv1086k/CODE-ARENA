<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile &amp; Settings - CodeArena</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              DEFAULT: '#0f1117',
              surface: '#161b22',
              border: '#1f2937'
            },
            primary: {
              DEFAULT: '#22c55e',
              hover: '#16a34a'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="global-typography">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f1117;
      color: #f3f4f6;
    }
    /* Smooth transition for theme switching if needed */
    .transition-theme {
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-2xl bg-dark-surface border border-dark-border rounded-2xl shadow-2xl overflow-hidden" data-purpose="settings-card">
<!-- BEGIN: HeaderSection -->
<header class="p-6 border-b border-dark-border">
<h1 class="text-2xl font-bold tracking-tight">Account Settings</h1>
<p class="text-gray-400 text-sm mt-1">Manage your profile information and security preferences.</p>
</header>
<!-- END: HeaderSection -->
<div class="p-6 space-y-10">
<!-- BEGIN: ProfileInfoSection -->
<section data-purpose="profile-details">
<div class="flex items-center justify-between mb-6">
<h2 class="text-lg font-semibold flex items-center gap-2">
<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
            Profile Information
          </h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="full-name">Full Name</label>
<input class="w-full bg-dark border-dark-border rounded-lg px-4 py-2.5 text-white focus:ring-primary focus:border-primary transition-all" id="full-name" readonly="" type="text" value="Alex Rivera"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="email-address">Email Address</label>
<input class="w-full bg-dark border-dark-border rounded-lg px-4 py-2.5 text-white focus:ring-primary focus:border-primary transition-all" id="email-address" readonly="" type="email" value="alex.r@codearena.io"/>
</div>
</div>
</section>
<!-- END: ProfileInfoSection -->
<!-- BEGIN: PasswordFormSection -->
<section data-purpose="security-settings">
<h2 class="text-lg font-semibold flex items-center gap-2 mb-6">
<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Change Password
        </h2>
<form class="space-y-4" id="password-form">
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="current-password">Current Password</label>
<input class="w-full bg-dark border-dark-border rounded-lg px-4 py-2.5 text-white focus:ring-primary focus:border-primary placeholder:text-gray-600 transition-all" id="current-password" placeholder="••••••••" type="password"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="new-password">New Password</label>
<input class="w-full bg-dark border-dark-border rounded-lg px-4 py-2.5 text-white focus:ring-primary focus:border-primary placeholder:text-gray-600 transition-all" id="new-password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="confirm-password">Confirm New Password</label>
<input class="w-full bg-dark border-dark-border rounded-lg px-4 py-2.5 text-white focus:ring-primary focus:border-primary placeholder:text-gray-600 transition-all" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="bg-primary hover:bg-primary-hover text-dark font-bold py-2.5 px-6 rounded-lg transition-colors duration-200" type="submit">
              Update Password
            </button>
</div>
</form>
</section>
<!-- END: PasswordFormSection -->
<!-- BEGIN: ThemeToggleSection -->
<section class="pt-6 border-t border-dark-border" data-purpose="preferences">
<div class="flex items-center justify-between">
<div>
<h2 class="text-lg font-semibold flex items-center gap-2">
<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
              Appearance
            </h2>
<p class="text-gray-400 text-sm">Switch between dark and light themes</p>
</div>
<!-- Custom Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" id="theme-toggle" type="checkbox" value=""/>
<div class="w-11 h-6 bg-dark border border-dark-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-300 after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary peer-checked:after:bg-white"></div>
</label>
</div>
</section>
<!-- END: ThemeToggleSection -->
</div>
<!-- BEGIN: FooterActions -->
<footer class="bg-dark/50 p-6 flex justify-end gap-3">
<button class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white transition-colors">Discard Changes</button>
<button class="px-6 py-2 text-sm font-semibold bg-primary text-dark rounded-lg hover:bg-primary-hover transition-colors">Save All</button>
</footer>
<!-- END: FooterActions -->
</main>
<!-- END: MainContainer -->
<script data-purpose="theme-handler">
    /* Simple script to handle theme toggle interaction */
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('change', (e) => {
      if (!e.target.checked) {
        console.log('Switching to Light Mode (Not implemented in this UI preview)');
        // In a real app, this would toggle a class on the body
      } else {
        console.log('Switching to Dark Mode');
      }
    });
  </script>
<script data-purpose="form-submission">
    /* Prevent default for the dummy password update */
    const passwordForm = document.getElementById('password-form');
    passwordForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Password update triggered!');
    });
  </script>
</body></html>
